  <rect x="232" y="148" width="48" height="8" rx="4" fill="rgba(255,255,255,0.3)"/>
  <!-- App name -->
  <text x="256" y="418" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif" font-size="60" font-weight="900" fill="white" letter-spacing="3">HINT</text>
  <text x="256" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.78)" letter-spacing="1">現場デジタル化</text>
</svg>

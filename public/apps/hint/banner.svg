      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="300" rx="20" fill="url(#bg)"/>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="300" fill="url(#accent)"/>
  <!-- Smartphone icon left -->
  <rect x="65" y="48" width="100" height="200" rx="16" fill="white" opacity="0.88"/>
  <rect x="75" y="64" width="80" height="148" rx="8" fill="#0C4A6E"/>
  <circle cx="115" cy="232" r="8" fill="rgba(186,230,253,0.8)"/>

  <!-- Description -->
  <text x="200" y="210" font-family="Meiryo, Yu Gothic, MS PGothic, Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.85)">製造現場デジタル化ツール群</text>
  <text x="200" y="242" font-family="Meiryo, Yu Gothic, MS PGothic, Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.55)">生産状況確認・実績入力・トレーサビリティ照会をデジタルで一元化</text>

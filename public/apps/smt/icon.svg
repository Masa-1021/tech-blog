<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#134E4A"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#grad)"/>
  <!-- PCB board body -->
  <rect x="148" y="136" width="216" height="216" rx="12" fill="rgba(255,255,255,0.12)" stroke="white" stroke-width="6" filter="url(#shadow)"/>
  <!-- Chip/IC in center -->
  <rect x="198" y="186" width="116" height="116" rx="8" fill="white"/>
  <!-- IC inner detail -->
  <rect x="214" y="202" width="84" height="84" rx="4" fill="#0D9488"/>
  <!-- IC pin lines left -->
  <line x1="148" y1="200" x2="198" y2="200" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="148" y1="224" x2="198" y2="224" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="148" y1="248" x2="198" y2="248" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="148" y1="272" x2="198" y2="272" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <!-- IC pin lines right -->
  <line x1="314" y1="200" x2="364" y2="200" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="314" y1="224" x2="364" y2="224" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="314" y1="248" x2="364" y2="248" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="314" y1="272" x2="364" y2="272" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <!-- IC pin lines top -->
  <line x1="212" y1="136" x2="212" y2="186" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="240" y1="136" x2="240" y2="186" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="272" y1="136" x2="272" y2="186" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="300" y1="136" x2="300" y2="186" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <!-- IC pin lines bottom -->
  <line x1="212" y1="302" x2="212" y2="352" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="240" y1="302" x2="240" y2="352" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="272" y1="302" x2="272" y2="352" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="300" y1="302" x2="300" y2="352" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <!-- Connection trace lines on board -->
  <polyline points="128,200 148,200" stroke="rgba(255,255,255,0.4)" stroke-width="4"/>
  <polyline points="128,272 148,272" stroke="rgba(255,255,255,0.4)" stroke-width="4"/>
  <!-- App name -->
  <text x="256" y="418" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif" font-size="65" font-weight="900" fill="white" letter-spacing="4">SMT</text>
  <text x="256" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.78)" letter-spacing="1">トレーサビリティ</text>
</svg>

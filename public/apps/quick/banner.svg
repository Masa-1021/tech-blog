  <rect x="940" y="100" width="38" height="150" rx="4" fill="rgba(252,211,77,0.2)" stroke="rgba(252,211,77,0.3)" stroke-width="1"/>
  <rect x="990" y="80" width="38" height="170" rx="4" fill="rgba(252,211,77,0.28)" stroke="rgba(252,211,77,0.4)" stroke-width="1"/>
  <rect x="1040" y="110" width="38" height="140" rx="4" fill="rgba(252,211,77,0.2)" stroke="rgba(252,211,77,0.3)" stroke-width="1"/>
  <rect x="1090" y="90" width="38" height="160" rx="4" fill="rgba(252,211,77,0.25)" stroke="rgba(252,211,77,0.35)" stroke-width="1"/>
  <line x1="875" y1="252" x2="1145" y2="252" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- CAD document border -->
  <rect x="138" y="138" width="236" height="196" rx="6" fill="none" stroke="white" stroke-width="8" filter="url(#shadow)"/>
  <!-- Compass symbol -->
  <circle cx="256" cy="236" r="56" fill="none" stroke="white" stroke-width="8"/>
  <line x1="256" y1="180" x2="256" y2="292" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="200" y1="236" x2="312" y2="236" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <circle cx="256" cy="236" r="14" fill="white"/>

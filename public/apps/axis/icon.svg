  </defs>
  <rect width="512" height="512" rx="96" fill="url(#grad)"/>
  <!-- Blueprint grid lines -->
  <line x1="130" y1="150" x2="382" y2="150" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <line x1="130" y1="190" x2="382" y2="190" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <line x1="130" y1="230" x2="382" y2="230" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>

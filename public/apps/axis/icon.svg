  <line x1="130" y1="310" x2="382" y2="310" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <line x1="160" y1="130" x2="160" y2="340" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <line x1="210" y1="130" x2="210" y2="340" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <line x1="260" y1="130" x2="260" y2="340" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>

<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="35%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#0C1445"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="300" rx="20" fill="url(#bg)"/>
  <!-- Blueprint grid lines -->
  <line x1="0" y1="50" x2="1200" y2="50" stroke="rgba(14,165,233,0.08)" stroke-width="1"/>
  <line x1="0" y1="100" x2="1200" y2="100" stroke="rgba(14,165,233,0.08)" stroke-width="1"/>
  <line x1="0" y1="150" x2="1200" y2="150" stroke="rgba(14,165,233,0.08)" stroke-width="1"/>
  <line x1="0" y1="200" x2="1200" y2="200" stroke="rgba(14,165,233,0.08)" stroke-width="1"/>
  <line x1="0" y1="250" x2="1200" y2="250" stroke="rgba(14,165,233,0.08)" stroke-width="1"/>
  <line x1="50" y1="0" x2="50" y2="300" stroke="rgba(14,165,233,0.06)" stroke-width="1"/>
  <line x1="150" y1="0" x2="150" y2="300" stroke="rgba(14,165,233,0.06)" stroke-width="1"/>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="300" fill="url(#accent)"/>
  <!-- Compass icon left -->
  <circle cx="120" cy="150" r="80" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
  <circle cx="120" cy="150" r="55" fill="none" stroke="white" stroke-width="6" opacity="0.8"/>
  <line x1="120" y1="95" x2="120" y2="205" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  <line x1="65" y1="150" x2="175" y2="150" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  <circle cx="120" cy="150" r="14" fill="white" opacity="0.9"/>
  <polygon points="120,98 114,128 120,118 126,128" fill="#0EA5E9"/>
  <!-- App name -->
  <text x="230" y="115" font-family="'Arial Black', Arial, sans-serif" font-size="72" font-weight="900" fill="white" letter-spacing="3">AXIS</text>
  <!-- Subtitle line -->
  <line x1="230" y1="135" x2="700" y2="135" stroke="rgba(14,165,233,0.6)" stroke-width="2"/>
  <!-- Category tag -->
  <rect x="230" y="148" width="190" height="28" rx="14" fill="rgba(14,165,233,0.2)" stroke="rgba(14,165,233,0.5)" stroke-width="1"/>
  <text x="325" y="167" text-anchor="middle" font-family="Meiryo, Yu Gothic, MS PGothic, Arial, sans-serif" font-size="14" fill="#0EA5E9" font-weight="600" letter-spacing="1">AI / CAD / 図面管理</text>
  <!-- Description -->
  <text x="230" y="210" font-family="Meiryo, Yu Gothic, MS PGothic, Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.85)">AI駆動型設備ドキュメント管理システム</text>
  <text x="230" y="242" font-family="Meiryo, Yu Gothic, MS PGothic, Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.55)">図面の自動解析・AI検索・設備情報の統合管理で現場の情報アクセスを変革</text>
  <!-- Right decorative: technical drawing lines -->
  <rect x="920" y="60" width="220" height="180" rx="6" fill="none" stroke="rgba(14,165,233,0.15)" stroke-width="2"/>
  <line x1="950" y1="110" x2="1110" y2="110" stroke="rgba(14,165,233,0.1)" stroke-width="1.5"/>
  <line x1="950" y1="150" x2="1060" y2="150" stroke="rgba(14,165,233,0.15)" stroke-width="1.5"/>
  <line x1="950" y1="190" x2="1090" y2="190" stroke="rgba(14,165,233,0.1)" stroke-width="1.5"/>
  <circle cx="1060" cy="150" r="25" fill="none" stroke="rgba(14,165,233,0.2)" stroke-width="2"/>
</svg>

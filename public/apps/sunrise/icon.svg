<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C2D12"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#grad)"/>
  <!-- Sun rays -->
  <line x1="256" y1="290" x2="256" y2="148" stroke="rgba(254,215,170,0.5)" stroke-width="10" stroke-linecap="round"/>
  <line x1="256" y1="290" x2="164" y2="198" stroke="rgba(254,215,170,0.38)" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="290" x2="348" y2="198" stroke="rgba(254,215,170,0.38)" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="290" x2="118" y2="248" stroke="rgba(254,215,170,0.28)" stroke-width="7" stroke-linecap="round"/>
  <line x1="256" y1="290" x2="394" y2="248" stroke="rgba(254,215,170,0.28)" stroke-width="7" stroke-linecap="round"/>
  <!-- Horizon line -->
  <line x1="80" y1="290" x2="432" y2="290" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.85"/>
  <!-- Sun semi-circle rising above horizon -->
  <path d="M 160 290 A 96 96 0 0 1 352 290 Z" fill="white" opacity="0.90" filter="url(#shadow)"/>
  <path d="M 178 290 A 78 78 0 0 1 334 290 Z" fill="#EA580C" opacity="0.6"/>
  <!-- Ground shimmer -->
  <path d="M 100 316 Q 160 306 220 318 Q 280 330 340 318 Q 390 308 420 316" fill="none" stroke="rgba(254,215,170,0.4)" stroke-width="8" stroke-linecap="round"/>
  <!-- App name -->
  <text x="256" y="416" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif" font-size="46" font-weight="900" fill="white" letter-spacing="1">SUNRISE</text>
  <text x="256" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.78)" letter-spacing="1">品質分析</text>
</svg>

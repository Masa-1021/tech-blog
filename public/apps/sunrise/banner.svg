<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1C0A00"/>
      <stop offset="40%" stop-color="#7C2D12"/>
      <stop offset="100%" stop-color="#0F0500"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#C2410C"/>
    </linearGradient>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FED7AA" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#FB923C" stop-opacity="0.18"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="300" rx="20" fill="url(#bg)"/>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="300" fill="url(#accent)"/>
  <!-- Sky glow behind sun -->
  <ellipse cx="162" cy="210" rx="130" ry="80" fill="url(#sky)"/>
  <!-- Horizon line -->
  <line x1="30" y1="210" x2="290" y2="210" stroke="rgba(251,146,60,0.55)" stroke-width="3" stroke-linecap="round"/>
  <!-- Sun rays (behind sun) -->
  <line x1="162" y1="210" x2="162" y2="115" stroke="rgba(254,215,170,0.35)" stroke-width="6" stroke-linecap="round"/>
  <line x1="162" y1="210" x2="104" y2="135" stroke="rgba(254,215,170,0.25)" stroke-width="5" stroke-linecap="round"/>
  <line x1="162" y1="210" x2="220" y2="135" stroke="rgba(254,215,170,0.25)" stroke-width="5" stroke-linecap="round"/>
  <line x1="162" y1="210" x2="75"  y2="168" stroke="rgba(254,215,170,0.18)" stroke-width="4" stroke-linecap="round"/>
  <line x1="162" y1="210" x2="249" y2="168" stroke="rgba(254,215,170,0.18)" stroke-width="4" stroke-linecap="round"/>
  <!-- Sun (semi-circle rising above horizon) -->
  <path d="M 96 210 A 66 66 0 0 1 228 210 Z" fill="white" opacity="0.88"/>
  <path d="M 108 210 A 54 54 0 0 1 216 210 Z" fill="#FB923C" opacity="0.7"/>
  <!-- Ground reflection shimmer -->
  <path d="M 60 222 Q 100 218 140 224 Q 180 230 220 222 Q 250 218 275 224" fill="none" stroke="rgba(251,146,60,0.3)" stroke-width="3" stroke-linecap="round"/>
  <!-- App name -->
  <text x="318" y="115" font-family="'Arial Black', Arial, sans-serif" font-size="68" font-weight="900" fill="white" letter-spacing="2">SUNRISE</text>
  <!-- Subtitle line -->
  <line x1="318" y1="135" x2="860" y2="135" stroke="rgba(251,146,60,0.6)" stroke-width="2"/>
  <!-- Category tag -->
  <rect x="318" y="148" width="228" height="28" rx="14" fill="rgba(251,146,60,0.15)" stroke="rgba(251,146,60,0.45)" stroke-width="1"/>
  <text x="432" y="167" text-anchor="middle" font-family="Meiryo, Yu Gothic, MS PGothic, Arial, sans-serif" font-size="14" fill="#FB923C" font-weight="600" letter-spacing="1">品質分析 / トレンド / 見える化</text>
  <!-- Description -->
  <text x="318" y="210" font-family="Meiryo, Yu Gothic, MS PGothic, Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.85)">品質結果分析システム</text>
  <text x="318" y="242" font-family="Meiryo, Yu Gothic, MS PGothic, Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.5)">製造ラインの品質検査結果を収集・分析し、不良要因の特定と品質改善を支援</text>
  <!-- Right decorative: quality trend line chart (improving upward) -->
  <line x1="880" y1="252" x2="1160" y2="252" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <polyline points="900,230 940,215 980,220 1020,195 1060,175 1100,155 1140,120" fill="none" stroke="rgba(251,146,60,0.5)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Area fill under line -->
  <polygon points="900,230 940,215 980,220 1020,195 1060,175 1100,155 1140,120 1140,252 900,252" fill="rgba(251,146,60,0.07)"/>
  <!-- Data points -->
  <circle cx="900"  cy="230" r="5" fill="#FB923C" opacity="0.6"/>
  <circle cx="940"  cy="215" r="5" fill="#FB923C" opacity="0.6"/>
  <circle cx="980"  cy="220" r="5" fill="#FB923C" opacity="0.6"/>
  <circle cx="1020" cy="195" r="5" fill="#FB923C" opacity="0.7"/>
  <circle cx="1060" cy="175" r="5" fill="#FB923C" opacity="0.8"/>
  <circle cx="1100" cy="155" r="5" fill="#FB923C" opacity="0.9"/>
  <circle cx="1140" cy="120" r="7" fill="#FB923C"/>
  <circle cx="1140" cy="120" r="14" fill="none" stroke="rgba(251,146,60,0.4)" stroke-width="2"/>
</svg>

  <text x="230" y="242" font-family="Meiryo, Yu Gothic, MS PGothic, Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.55)">製造現場の画像からグラフ・テーブルを自動解析しデータを即座に抽出</text>

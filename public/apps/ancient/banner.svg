  <line x1="0" y1="220" x2="380" y2="220" stroke="rgba(245,158,11,0.1)" stroke-width="1"/>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="300" rx="0" fill="url(#accent)"/>
  <!-- Icon area (left) -->
  <!-- Cloud icon -->
  <path d="M 68 118 Q 65 94 82 90 Q 84 68 104 65 Q 113 50 126 56 Q 140 47 154 60 Q 177 60 177 88 Q 193 94 188 118 Z" fill="white" opacity="0.9"/>
  <line x1="86" y1="138" x2="146" y2="138" stroke="white" stroke-width="9" stroke-linecap="round" opacity="0.9"/>
  <polyline points="136,129 156,138 136,147" fill="none" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <line x1="92" y1="158" x2="142" y2="158" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <line x1="98" y1="175" x2="136" y2="175" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  <!-- App name -->
  <text x="230" y="115" font-family="'Arial Black', Arial, sans-serif" font-size="72" font-weight="900" fill="white" letter-spacing="3">ANCIENT</text>
  <!-- Subtitle line -->
  <line x1="230" y1="135" x2="700" y2="135" stroke="rgba(245,158,11,0.6)" stroke-width="2"/>
  <!-- Category tag -->

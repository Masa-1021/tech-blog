<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#022C22"/>
      <stop offset="35%" stop-color="#065F46"/>
      <stop offset="100%" stop-color="#011C16"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="300" rx="20" fill="url(#bg)"/>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="300" fill="url(#accent)"/>
  <!-- Eye icon left -->
  <path d="M 45 150 Q 90 88 165 88 Q 240 88 285 150 Q 240 212 165 212 Q 90 212 45 150 Z" fill="white" opacity="0.85"/>
  <circle cx="165" cy="150" r="42" fill="#065F46"/>
  <circle cx="165" cy="150" r="24" fill="#022C22"/>
  <circle cx="174" cy="141" r="7" fill="rgba(255,255,255,0.6)"/>
  <!-- Wave lines below icon -->
  <path d="M 60 240 Q 82 228 104 240 Q 126 252 148 240 Q 170 228 192 240 Q 214 252 236 240 Q 258 228 272 240" fill="none" stroke="rgba(52,211,153,0.5)" stroke-width="6" stroke-linecap="round"/>
  <!-- App name -->
  <text x="310" y="115" font-family="'Arial Black', Arial, sans-serif" font-size="68" font-weight="900" fill="white" letter-spacing="2">FORESIGHT</text>
  <!-- Subtitle line -->
  <line x1="310" y1="135" x2="850" y2="135" stroke="rgba(52,211,153,0.6)" stroke-width="2"/>
  <!-- Category tag -->
  <rect x="310" y="148" width="210" height="28" rx="14" fill="rgba(52,211,153,0.15)" stroke="rgba(52,211,153,0.45)" stroke-width="1"/>
  <text x="415" y="167" text-anchor="middle" font-family="Meiryo, Yu Gothic, MS PGothic, Arial, sans-serif" font-size="14" fill="#34D399" font-weight="600" letter-spacing="1">AI / 予兆保全 / 異常検知</text>
  <!-- Description -->
  <text x="310" y="210" font-family="Meiryo, Yu Gothic, MS PGothic, Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.85)">予兆保全AIシステム</text>
  <text x="310" y="242" font-family="Meiryo, Yu Gothic, MS PGothic, Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.55)">品質・稼働データからAIが「壊れる前の異変」を検知し突発停止ゼロを目指す</text>
  <!-- Right decorative: prediction graph -->
  <polyline points="900,200 950,180 1000,190 1050,140 1100,120 1150,100" fill="none" stroke="rgba(52,211,153,0.35)" stroke-width="3" stroke-linecap="round"/>
  <!-- Prediction area -->
  <path d="M 1050,140 L 1100,120 L 1150,100 L 1150,260 L 1050,260 Z" fill="rgba(52,211,153,0.05)"/>
  <line x1="1050" y1="60" x2="1050" y2="260" stroke="rgba(52,211,153,0.25)" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="1070" y="90" font-family="Meiryo, Yu Gothic, MS PGothic, Arial, sans-serif" font-size="13" fill="rgba(52,211,153,0.6)">予測</text>
  <!-- Anomaly point -->
  <circle cx="1050" cy="140" r="8" fill="#34D399" opacity="0.8"/>
  <circle cx="1050" cy="140" r="16" fill="none" stroke="rgba(52,211,153,0.4)" stroke-width="2"/>
</svg>
